  const container = document.getElementById('episodes-list');

  episodes.forEach((e, i) => {
    container.innerHTML += `
    <div class="episode-card">
      <div class="episode-thumb"><img src="${COVER}" alt="${e.ep}"></div>
      <div class="episode-info">
        <div class="episode-meta"><span class="episode-number">${e.ep}</span><span>${e.date}</span><span>${e.dur}</span></div>
        <h3><a href="${AP}${e.ap}" target="_blank">${e.title}</a></h3>
        <p class="episode-desc">${e.desc}</p>
        <div class="episode-player">
          <audio preload="none" data-idx="${i}"><source src="${e.audio}"></audio>
          <div class="custom-player">
            <button class="player-play" onclick="togglePlay(${i})" aria-label="Play">
              <svg class="icon-play" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
              <svg class="icon-pause" viewBox="0 0 24 24"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
            </button>
            <div class="player-middle">
              <div class="player-track" onclick="seekAudio(event, ${i})">
                <div class="player-progress" id="prog-${i}"></div>
              </div>
            </div>
            <span class="player-time" id="time-${i}">0:00 / ${e.dur.replace(' min',':00')}</span>
          </div>
        </div>
      </div>
    </div>`;

  <script>
    // ===== Language =====
    let currentLang = localStorage.getItem('lang') || 'en';

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.getElementById('lang-toggle').textContent = lang === 'en' ? '\u4e2d\u6587' : 'EN';
      document.querySelectorAll('[data-en][data-zh]').forEach(el => {
        el.innerHTML = el.getAttribute('data-' + lang);
      });
    }

    function toggleLang() { setLang(currentLang === 'en' ? 'zh' : 'en'); }

    // ===== Theme =====
    function toggleTheme() {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('theme-toggle').textContent = next === 'dark' ? '\u2600' : '\u263E';
    }

    // ===== Init =====
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
        if (savedTheme === 'dark') document.getElementById('theme-toggle').textContent = '\u2600';
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-toggle').textContent = '\u2600';
      }
      if (currentLang !== 'en') setLang(currentLang);
    })();

    // ===== Mobile Menu =====
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', () => document.querySelector('.nav-links').classList.remove('open'));
    });

    // ===== Custom Audio Player =====
    let currentAudio = null;
    let currentIdx = null;

    function fmt(s) {
      if (isNaN(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function togglePlay(idx) {
      const audio = document.querySelector(`audio[data-idx="${idx}"]`);
      const btn = audio.closest('.episode-player').querySelector('.player-play');

      if (currentAudio && currentAudio !== audio) {
        currentAudio.pause();
        const prevBtn = currentAudio.closest('.episode-player').querySelector('.player-play');
        if (prevBtn) prevBtn.classList.remove('playing');
      }

      if (audio.paused) {
        audio.play().catch(() => {});
        btn.classList.add('playing');
        currentAudio = audio;
        currentIdx = idx;
      } else {
        audio.pause();
        btn.classList.remove('playing');
      }
    }

    function seekAudio(e, idx) {
      const audio = document.querySelector(`audio[data-idx="${idx}"]`);
      const track = e.currentTarget;
      const rect = track.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      if (audio.duration) {
        audio.currentTime = pct * audio.duration;
        if (audio.paused) togglePlay(idx);
      }
    }

    document.addEventListener('timeupdate', function(e) {
      if (e.target.tagName !== 'AUDIO') return;
      const idx = e.target.dataset.idx;
      const prog = document.getElementById('prog-' + idx);
      const time = document.getElementById('time-' + idx);
      if (!prog) return;
      const pct = (e.target.currentTime / e.target.duration) * 100;
      prog.style.width = pct + '%';
      time.textContent = fmt(e.target.currentTime) + ' / ' + fmt(e.target.duration);
    }, true);

    document.addEventListener('ended', function(e) {
      if (e.target.tagName !== 'AUDIO') return;
      const btn = e.target.closest('.episode-player').querySelector('.player-play');
      if (btn) btn.classList.remove('playing');
    }, true);
  </script>
