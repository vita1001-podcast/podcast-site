  <script>
    // ===== Language =====
    let currentLang = localStorage.getItem('lang') || 'en';

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.getElementById('lang-toggle').textContent = lang === 'en' ? '\u4e2d\u6587' : 'EN';
      document.querySelectorAll('[data-en][data-zh]').forEach(el => {
        el.innerHTML = el.getAttribute('data-' + lang);
      });
    }

    function toggleLang() { setLang(currentLang === 'en' ? 'zh' : 'en'); }

    // ===== Theme =====
    function toggleTheme() {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      document.getElementById('theme-toggle').textContent = next === 'dark' ? '\u2600' : '\u263E';
    }

    // ===== Init =====
    (function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme) {
        document.documentElement.setAttribute('data-theme', savedTheme);
        if (savedTheme === 'dark') document.getElementById('theme-toggle').textContent = '\u2600';
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('theme-toggle').textContent = '\u2600';
      }
      if (currentLang !== 'en') setLang(currentLang);
    })();

    // ===== Mobile Menu =====
    document.querySelectorAll('.nav-links a').forEach(link => {
      link.addEventListener('click', () => document.querySelector('.nav-links').classList.remove('open'));
    });
  </script>
